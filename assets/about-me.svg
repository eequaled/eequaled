    <circle cx="35" cy="155" r="4" fill="#f1e05a"/>
    <text x="45" y="159" class="lang-text">JavaScript 1.8%</text>
    <path d="M 224.0469080054658 106.9881054417983 A 65 65 0 0 0 218.67819895672906 108.59657338331051" fill="none" stroke="#f1e05a" stroke-width="16" stroke-dasharray="5.606218410640407 408.4070449666731" stroke-dashoffset="5.606218410640407" class="arc" />
    <circle cx="35" cy="183" r="4" fill="#3572A5"/>
    <text x="45" y="187" class="lang-text">Python 1.6%</text>
    <path d="M 230.58375889245465 105.6856594264967 A 65 65 0 0 0 225.70183383828618 106.59209477981454" fill="none" stroke="#3572A5" stroke-width="16" stroke-dasharray="4.966569839525409 408.4070449666731" stroke-dashoffset="4.966569839525409" class="arc" />
    <circle cx="35" cy="211" r="4" fill="#663399"/>
    <text x="45" y="215" class="lang-text">CSS 1.3%</text>
    <path d="M 235.75401414989457 105.13882822396204 A 65 65 0 0 0 232.2705387717539 105.46120988799805" fill="none" stroke="#663399" stroke-width="16" stroke-dasharray="3.498783511707436 408.4070449666731" stroke-dashoffset="3.498783511707436" class="arc" />
    <circle cx="35" cy="239" r="4" fill="#012456"/>
    <text x="45" y="243" class="lang-text">PowerShell 0.4%</text>
    <path d="M 239.13523105595007 105.00575275708313 A 65 65 0 0 0 237.45333668396898 105.0499075754716" fill="none" stroke="#012456" stroke-width="16" stroke-dasharray="1.6825208430447778 408.4070449666731" stroke-dashoffset="1.6825208430447778" class="arc" />
    <circle cx="35" cy="267" r="4" fill="#e34c26"/>
    <text x="45" y="271" class="lang-text">HTML 0.1%</text>
    <path d="M 239.64731655705168 105.00095681943411 A 65 65 0 0 0 239.13523105595007 105.00575275708313" fill="none" stroke="#e34c26" stroke-width="16" stroke-dasharray="0.512109283283321 408.4070449666731" stroke-dashoffset="0.512109283283321" class="arc" />
  </g>
</svg>
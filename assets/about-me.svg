    <circle cx="35" cy="155" r="4" fill="#f1e05a"/>
    <text x="45" y="159" class="lang-text">JavaScript 1.7%</text>
    <path d="M 225.6849154142949 106.59591217197342 A 65 65 0 0 0 220.64252557727312 107.94930956086408" fill="none" stroke="#f1e05a" stroke-width="16" stroke-dasharray="5.222264500802577 408.4070449666731" stroke-dashoffset="5.222264500802577" class="arc" />
    <circle cx="35" cy="183" r="4" fill="#3572A5"/>
    <text x="45" y="187" class="lang-text">Python 1.6%</text>
    <path d="M 232.03938156246096 105.48931441930017 A 65 65 0 0 0 227.34954636583726 106.24291394009683" fill="none" stroke="#3572A5" stroke-width="16" stroke-dasharray="4.751054019089199 408.4070449666731" stroke-dashoffset="4.751054019089199" class="arc" />
    <circle cx="35" cy="211" r="4" fill="#663399"/>
    <text x="45" y="215" class="lang-text">CSS 1.2%</text>
    <path d="M 237.05275842340976 105.06685155416213 A 65 65 0 0 0 233.73080234933005 105.30303592272018" fill="none" stroke="#663399" stroke-width="16" stroke-dasharray="3.3307059880181873 408.4070449666731" stroke-dashoffset="3.3307059880181873" class="arc" />
    <circle cx="35" cy="239" r="4" fill="#012456"/>
    <text x="45" y="243" class="lang-text">PowerShell 0.1%</text>
    <path d="M 239.3392672384598 105.00335830046427 A 65 65 0 0 0 238.75352003982314 105.01195273199173" fill="none" stroke="#012456" stroke-width="16" stroke-dasharray="0.5858122291590354 408.4070449666731" stroke-dashoffset="0.5858122291590354" class="arc" />
    <circle cx="35" cy="267" r="4" fill="#e34c26"/>
    <text x="45" y="271" class="lang-text">HTML 0.1%</text>
    <path d="M 239.83481414256647 105.00020989547347 A 65 65 0 0 0 239.3392672384598 105.00335830046427" fill="none" stroke="#e34c26" stroke-width="16" stroke-dasharray="0.4955581057128207 408.4070449666731" stroke-dashoffset="0.4955581057128207" class="arc" />
  </g>
</svg>
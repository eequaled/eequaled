    <path d="M 224.04430978659548 106.98876330515432 A 65 65 0 0 0 218.67438359183922 108.59789836811785" fill="none" stroke="#f1e05a" stroke-width="16" stroke-dasharray="5.607577085909056 408.4070449666731" stroke-dashoffset="5.607577085909056" class="arc" />
    <circle cx="35" cy="183" r="4" fill="#3572A5"/>
    <text x="45" y="187" class="lang-text">Python 1.6%</text>
    <path d="M 230.58233363248266 105.68586811446389 A 65 65 0 0 0 225.69921928890545 106.59268440429616" fill="none" stroke="#3572A5" stroke-width="16" stroke-dasharray="4.96780959239802 408.4070449666731" stroke-dashoffset="4.96780959239802" class="arc" />
    <circle cx="35" cy="211" r="4" fill="#663399"/>
    <text x="45" y="215" class="lang-text">CSS 1.3%</text>
    <path d="M 235.75354156890123 105.13885916210731 A 65 65 0 0 0 232.26910853736877 105.46138119549647" fill="none" stroke="#663399" stroke-width="16" stroke-dasharray="3.499750376192806 408.4070449666731" stroke-dashoffset="3.499750376192806" class="arc" />
    <circle cx="35" cy="239" r="4" fill="#012456"/>
    <text x="45" y="243" class="lang-text">PowerShell 0.4%</text>
    <path d="M 239.13507028903865 105.00575489633643 A 65 65 0 0 0 237.45286345505107 105.04992613228693" fill="none" stroke="#012456" stroke-width="16" stroke-dasharray="1.682833654515124 408.4070449666731" stroke-dashoffset="1.682833654515124" class="arc" />
    <circle cx="35" cy="267" r="4" fill="#e34c26"/>
    <text x="45" y="271" class="lang-text">HTML 0.1%</text>
    <path d="M 239.6472509873776 105.00095717524685 A 65 65 0 0 0 239.13507028903865 105.00575489633643" fill="none" stroke="#e34c26" stroke-width="16" stroke-dasharray="0.5122044937875735 408.4070449666731" stroke-dashoffset="0.5122044937875735" class="arc" />
  </g>

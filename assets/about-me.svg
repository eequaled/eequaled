    <path d="M 236.1767952571495 105.11253506651501 A 65 65 0 0 0 236.1632053422248 105.11333721977938" fill="none" stroke="#012456" stroke-width="16" stroke-dasharray="0.01361356816555578 408.4070449666731" stroke-dashoffset="0.01361356816555578" class="arc" />
    <circle cx="35" cy="239" r="4" fill="#3572A5"/>
    <text x="45" y="243" class="lang-text">Python 0.4%</text>
    <path d="M 239.4282375107242 105.00251475898581 A 65 65 0 0 0 237.876661189321 105.0346905472231" fill="none" stroke="#3572A5" stroke-width="16" stroke-dasharray="1.5519467708733579 408.4070449666731" stroke-dashoffset="1.5519467708733579" class="arc" />
    <circle cx="35" cy="267" r="4" fill="#e34c26"/>
    <text x="45" y="271" class="lang-text">HTML 0.1%</text>
    <path d="M 239.95915929819057 105.0000128304853 A 65 65 0 0 0 239.4282375107242 105.00251475898581" fill="none" stroke="#e34c26" stroke-width="16" stroke-dasharray="0.530929158456675 408.4070449666731" stroke-dashoffset="0.530929158456675" class="arc" />
  </g>

name: Generate Profile SVG

on:
  schedule:
    - cron: '0 0 */5 * *' # Run every 5 days
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Unified SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate-profile-board.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/about-me.svg
          git diff --staged --quiet || git commit -m "chore: auto-update language stats SVG"
          git push

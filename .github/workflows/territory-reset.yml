name: Territory Game - Monthly Reset

on:
  schedule:
    - cron: '0 0 1 * *'   # 1st of every month at midnight UTC
  workflow_dispatch:        # allow manual trigger for testing

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/reset-game.py
      - run: |
          git config user.name "territory-bot"
          git config user.email "territory-bot@users.noreply.github.com"
          git add assets/game-state.json assets/game-board.svg
          git commit -m "🔄 Monthly board reset"
          git push
